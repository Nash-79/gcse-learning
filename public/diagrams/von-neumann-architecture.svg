<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-labelledby="vn-title vn-desc">
  <title id="vn-title">Von Neumann Architecture</title>
  <desc id="vn-desc">Diagram of Von Neumann architecture showing a CPU connected to Main Memory (RAM) via three system buses: Address Bus (one-way), Data Bus (bidirectional), and Control Bus (bidirectional). Input and Output devices are also shown connected to the CPU.</desc>

  <!-- Background -->
  <rect width="800" height="460" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="400" y="34" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E293B" text-anchor="middle">Von Neumann Architecture</text>

  <!-- ── CPU (left-centre) ── -->
  <rect x="60" y="100" width="240" height="240" rx="14" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="180" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8" text-anchor="middle">CPU</text>

  <!-- CU inside CPU -->
  <rect x="82" y="146" width="196" height="52" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="180" y="168" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1D4ED8" text-anchor="middle">Control Unit (CU)</text>
  <text x="180" y="186" font-family="Arial, sans-serif" font-size="9.5" fill="#6B7280" text-anchor="middle">Fetches, decodes, directs</text>

  <!-- ALU inside CPU -->
  <rect x="82" y="210" width="196" height="52" rx="8" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="180" y="232" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6D28D9" text-anchor="middle">ALU</text>
  <text x="180" y="250" font-family="Arial, sans-serif" font-size="9.5" fill="#6B7280" text-anchor="middle">Arithmetic &amp; logic</text>

  <!-- Registers inside CPU -->
  <rect x="82" y="274" width="196" height="46" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="180" y="295" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400E" text-anchor="middle">Registers</text>
  <text x="180" y="312" font-family="Arial, sans-serif" font-size="9.5" fill="#6B7280" text-anchor="middle">PC · MAR · MDR · CIR</text>

  <!-- ── RAM (right) ── -->
  <rect x="500" y="100" width="240" height="240" rx="14" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2.5"/>
  <text x="620" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6D28D9" text-anchor="middle">Main Memory</text>
  <text x="620" y="150" font-family="Arial, sans-serif" font-size="11" fill="#8B5CF6" text-anchor="middle">(RAM)</text>

  <rect x="524" y="166" width="192" height="30" rx="5" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="620" y="186" font-family="Arial, sans-serif" font-size="9.5" fill="#5B21B6" text-anchor="middle">Program Instructions</text>

  <rect x="524" y="204" width="192" height="30" rx="5" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="620" y="224" font-family="Arial, sans-serif" font-size="9.5" fill="#5B21B6" text-anchor="middle">Data</text>

  <rect x="524" y="242" width="192" height="30" rx="5" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="620" y="262" font-family="Arial, sans-serif" font-size="9.5" fill="#5B21B6" text-anchor="middle">More Data</text>

  <!-- Stored program concept label -->
  <text x="620" y="308" font-family="Arial, sans-serif" font-size="9" fill="#7C3AED" text-anchor="middle" font-style="italic">Instructions &amp; data stored</text>
  <text x="620" y="322" font-family="Arial, sans-serif" font-size="9" fill="#7C3AED" text-anchor="middle" font-style="italic">together (stored program)</text>

  <!-- ── System Bus region ── -->
  <rect x="302" y="108" width="196" height="224" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="400" y="126" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#64748B" text-anchor="middle">System Bus</text>

  <!-- Address Bus (CPU → RAM, one-way) -->
  <line x1="310" y1="160" x2="498" y2="160" stroke="#3B82F6" stroke-width="3"/>
  <polygon points="494,155 506,160 494,165" fill="#3B82F6"/>
  <text x="400" y="152" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#1D4ED8" text-anchor="middle">Address Bus</text>
  <text x="400" y="178" font-family="Arial, sans-serif" font-size="8.5" fill="#6B7280" text-anchor="middle">CPU → RAM (one-way)</text>

  <!-- Data Bus (bidirectional) -->
  <line x1="310" y1="220" x2="498" y2="220" stroke="#10B981" stroke-width="3"/>
  <polygon points="315,215 303,220 315,225" fill="#10B981"/>
  <polygon points="494,215 506,220 494,225" fill="#10B981"/>
  <text x="400" y="212" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#065F46" text-anchor="middle">Data Bus</text>
  <text x="400" y="238" font-family="Arial, sans-serif" font-size="8.5" fill="#6B7280" text-anchor="middle">Bidirectional (both ways)</text>

  <!-- Control Bus (bidirectional) -->
  <line x1="310" y1="280" x2="498" y2="280" stroke="#F59E0B" stroke-width="3"/>
  <polygon points="315,275 303,280 315,285" fill="#F59E0B"/>
  <polygon points="494,275 506,280 494,285" fill="#F59E0B"/>
  <text x="400" y="272" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#92400E" text-anchor="middle">Control Bus</text>
  <text x="400" y="298" font-family="Arial, sans-serif" font-size="8.5" fill="#6B7280" text-anchor="middle">Bidirectional (read/write signals)</text>

  <!-- ── Input device ── -->
  <rect x="60" y="370" width="110" height="52" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="115" y="393" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#065F46" text-anchor="middle">Input</text>
  <text x="115" y="410" font-family="Arial, sans-serif" font-size="9.5" fill="#6B7280" text-anchor="middle">keyboard, mouse</text>

  <!-- ── Output device ── -->
  <rect x="190" y="370" width="110" height="52" rx="10" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
  <text x="245" y="393" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#C2410C" text-anchor="middle">Output</text>
  <text x="245" y="410" font-family="Arial, sans-serif" font-size="9.5" fill="#6B7280" text-anchor="middle">monitor, printer</text>

  <!-- Arrows from I/O to CPU -->
  <line x1="115" y1="370" x2="130" y2="342" stroke="#10B981" stroke-width="1.8" marker-end="url(#aio)"/>
  <line x1="245" y1="370" x2="220" y2="342" stroke="#F97316" stroke-width="1.8" marker-end="url(#aout)"/>

  <!-- Von Neumann bottleneck callout -->
  <rect x="540" y="370" width="220" height="62" rx="8" fill="#FEF2F2" stroke="#F87171" stroke-width="1.5"/>
  <text x="650" y="390" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#B91C1C" text-anchor="middle">⚠ Von Neumann Bottleneck</text>
  <text x="650" y="408" font-family="Arial, sans-serif" font-size="9" fill="#7F1D1D" text-anchor="middle">Data &amp; instructions share the</text>
  <text x="650" y="422" font-family="Arial, sans-serif" font-size="9" fill="#7F1D1D" text-anchor="middle">same bus — limits throughput</text>

  <defs>
    <marker id="aio" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10B981"/>
    </marker>
    <marker id="aout" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F97316"/>
    </marker>
  </defs>

  <!-- Spec ref -->
  <text x="400" y="450" font-family="Arial, sans-serif" font-size="10" fill="#9CA3AF" text-anchor="middle">OCR J277 1.1d — Von Neumann architecture and the stored program concept</text>
</svg>
