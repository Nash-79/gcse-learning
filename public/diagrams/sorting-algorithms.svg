<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" role="img" aria-labelledby="sa-title sa-desc">
  <title id="sa-title">Bubble Sort Step-by-Step</title>
  <desc id="sa-desc">Step-by-step visual of bubble sort on the list [5, 3, 8, 1, 4], showing each pass with swaps highlighted until the list is fully sorted.</desc>
  <rect width="760" height="460" fill="#F8FAFC" rx="12"/>
  <text x="380" y="34" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E293B" text-anchor="middle">Bubble Sort — Step by Step</text>
  <text x="380" y="54" font-family="Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Starting list: [ 5, 3, 8, 1, 4 ]   — compare adjacent pairs, swap if wrong order</text>
  <!-- Helper: box with number -->
  <!-- Pass 0: Original -->
  <text x="40" y="94" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#475569">Start:</text>
  <rect x="120" y="76" width="44" height="34" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="142" y="99" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8" text-anchor="middle">5</text>
  <rect x="170" y="76" width="44" height="34" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="192" y="99" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8" text-anchor="middle">3</text>
  <rect x="220" y="76" width="44" height="34" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="242" y="99" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8" text-anchor="middle">8</text>
  <rect x="270" y="76" width="44" height="34" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="292" y="99" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8" text-anchor="middle">1</text>
  <rect x="320" y="76" width="44" height="34" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="342" y="99" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8" text-anchor="middle">4</text>
  <!-- Pass 1 -->
  <text x="40" y="154" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#475569">Pass 1:</text>
  <!-- 5,3 → swap -->
  <rect x="120" y="136" width="44" height="34" rx="5" fill="#FEE2E2" stroke="#F43F5E" stroke-width="2"/><text x="142" y="159" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#B91C1C" text-anchor="middle">3</text>
  <rect x="170" y="136" width="44" height="34" rx="5" fill="#FEE2E2" stroke="#F43F5E" stroke-width="2"/><text x="192" y="159" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#B91C1C" text-anchor="middle">5</text>
  <text x="158" y="132" font-family="Arial, sans-serif" font-size="9" fill="#F43F5E" text-anchor="middle">swap↕</text>
  <rect x="220" y="136" width="44" height="34" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="242" y="159" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8" text-anchor="middle">8</text>
  <rect x="270" y="136" width="44" height="34" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="292" y="159" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8" text-anchor="middle">1</text>
  <rect x="320" y="136" width="44" height="34" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="342" y="159" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8" text-anchor="middle">4</text>
  <text x="460" y="156" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">5&gt;3 → swap | 5&lt;8 → ok | 8&gt;1 → swap | 8&gt;4 → swap</text>
  <!-- After Pass 1 -->
  <text x="40" y="218" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#475569">After P1:</text>
  <rect x="120" y="200" width="44" height="34" rx="5" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/><text x="142" y="223" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#065F46" text-anchor="middle">3</text>
  <rect x="170" y="200" width="44" height="34" rx="5" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/><text x="192" y="223" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#065F46" text-anchor="middle">5</text>
  <rect x="220" y="200" width="44" height="34" rx="5" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/><text x="242" y="223" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#065F46" text-anchor="middle">1</text>
  <rect x="270" y="200" width="44" height="34" rx="5" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/><text x="292" y="223" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#065F46" text-anchor="middle">4</text>
  <rect x="320" y="200" width="44" height="34" rx="5" fill="#F0FDF4" stroke="#10B981" stroke-width="2.5"/><text x="342" y="223" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#065F46" text-anchor="middle">8</text>
  <text x="380" y="218" font-family="Arial, sans-serif" font-size="10" fill="#10B981" font-weight="bold">← 8 is now in final position</text>
  <!-- After Pass 2 -->
  <text x="40" y="282" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#475569">After P2:</text>
  <rect x="120" y="264" width="44" height="34" rx="5" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/><text x="142" y="287" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#065F46" text-anchor="middle">3</text>
  <rect x="170" y="264" width="44" height="34" rx="5" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/><text x="192" y="287" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#065F46" text-anchor="middle">1</text>
  <rect x="220" y="264" width="44" height="34" rx="5" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/><text x="242" y="287" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#065F46" text-anchor="middle">4</text>
  <rect x="270" y="264" width="44" height="34" rx="5" fill="#F0FDF4" stroke="#10B981" stroke-width="2.5"/><text x="292" y="287" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#065F46" text-anchor="middle">5</text>
  <rect x="320" y="264" width="44" height="34" rx="5" fill="#F0FDF4" stroke="#10B981" stroke-width="2.5"/><text x="342" y="287" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#065F46" text-anchor="middle">8</text>
  <text x="380" y="282" font-family="Arial, sans-serif" font-size="10" fill="#10B981" font-weight="bold">← 5 and 8 in final position</text>
  <!-- Final -->
  <text x="40" y="358" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#475569">Sorted:</text>
  <rect x="120" y="340" width="44" height="34" rx="5" fill="#F0FDF4" stroke="#10B981" stroke-width="2.5"/><text x="142" y="363" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#065F46" text-anchor="middle">1</text>
  <rect x="170" y="340" width="44" height="34" rx="5" fill="#F0FDF4" stroke="#10B981" stroke-width="2.5"/><text x="192" y="363" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#065F46" text-anchor="middle">3</text>
  <rect x="220" y="340" width="44" height="34" rx="5" fill="#F0FDF4" stroke="#10B981" stroke-width="2.5"/><text x="242" y="363" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#065F46" text-anchor="middle">4</text>
  <rect x="270" y="340" width="44" height="34" rx="5" fill="#F0FDF4" stroke="#10B981" stroke-width="2.5"/><text x="292" y="363" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#065F46" text-anchor="middle">5</text>
  <rect x="320" y="340" width="44" height="34" rx="5" fill="#F0FDF4" stroke="#10B981" stroke-width="2.5"/><text x="342" y="363" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#065F46" text-anchor="middle">8</text>
  <text x="380" y="358" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#065F46">✓ Complete in 4 passes</text>
  <!-- Complexity box -->
  <rect x="490" y="60" width="240" height="120" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="610" y="82" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">Bubble Sort Facts</text>
  <text x="500" y="102" font-family="Arial, sans-serif" font-size="10" fill="#64748B">• Time: O(n²) — slow for large data</text>
  <text x="500" y="120" font-family="Arial, sans-serif" font-size="10" fill="#64748B">• Best case: O(n) — already sorted</text>
  <text x="500" y="138" font-family="Arial, sans-serif" font-size="10" fill="#64748B">• In-place — no extra memory needed</text>
  <text x="500" y="156" font-family="Arial, sans-serif" font-size="10" fill="#64748B">• Max passes = n − 1</text>
  <text x="380" y="450" font-family="Arial, sans-serif" font-size="10" fill="#9CA3AF" text-anchor="middle">OCR J277 2.1 / AQA 8525 3.1 — Bubble sort algorithm with trace</text>
</svg>
