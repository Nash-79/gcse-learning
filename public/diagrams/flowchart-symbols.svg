<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" role="img" aria-labelledby="fs-title fs-desc">
  <title id="fs-title">Flowchart Symbols</title>
  <desc id="fs-desc">All standard flowchart symbols used in GCSE Computer Science: Terminator, Process, Decision, Input/Output, and Flow Lines, each with a label and example.</desc>
  <rect width="700" height="480" fill="#F8FAFC" rx="12"/>
  <text x="350" y="34" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E293B" text-anchor="middle">Flowchart Symbols</text>
  <!-- Terminator (oval) -->
  <ellipse cx="130" cy="96" rx="70" ry="30" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="130" y="100" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1D4ED8" text-anchor="middle">Start / Stop</text>
  <text x="240" y="88" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1E293B">Terminator (Oval)</text>
  <text x="240" y="106" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Marks the beginning or end of an algorithm</text>
  <text x="240" y="122" font-family="Arial, sans-serif" font-size="10" fill="#3B82F6" font-style="italic">Example: "Start" or "End"</text>
  <!-- Process (rectangle) -->
  <rect x="60" y="164" width="140" height="50" rx="4" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2.5"/>
  <text x="130" y="193" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6D28D9" text-anchor="middle">total = total + 1</text>
  <text x="240" y="176" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1E293B">Process (Rectangle)</text>
  <text x="240" y="194" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">An action, assignment, or calculation</text>
  <text x="240" y="210" font-family="Arial, sans-serif" font-size="10" fill="#8B5CF6" font-style="italic">Example: x = x + 1 or total = 0</text>
  <!-- Decision (diamond) -->
  <polygon points="130,268 190,308 130,348 70,308" fill="#ECFDF5" stroke="#10B981" stroke-width="2.5"/>
  <text x="130" y="304" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#065F46" text-anchor="middle">age ≥ 18?</text>
  <text x="70" y="328" font-family="Arial, sans-serif" font-size="9" fill="#10B981">Yes</text>
  <text x="183" y="328" font-family="Arial, sans-serif" font-size="9" fill="#10B981">No</text>
  <text x="240" y="276" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1E293B">Decision (Diamond)</text>
  <text x="240" y="294" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">A Yes/No question — branches the flow</text>
  <text x="240" y="312" font-family="Arial, sans-serif" font-size="10" fill="#10B981" font-style="italic">Must always have Yes and No arrows</text>
  <!-- Input/Output (parallelogram) -->
  <polygon points="75,388 205,388 215,430 65,430" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="140" y="414" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400E" text-anchor="middle">Input name</text>
  <text x="240" y="396" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1E293B">Input/Output (Parallelogram)</text>
  <text x="240" y="414" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Data entering or leaving the system</text>
  <text x="240" y="432" font-family="Arial, sans-serif" font-size="10" fill="#F59E0B" font-style="italic">Input: "Enter name" | Output: "Display total"</text>
  <!-- Flow arrows connecting the symbols -->
  <line x1="130" y1="126" x2="130" y2="164" stroke="#94A3B8" stroke-width="2" marker-end="url(#fa)"/>
  <line x1="130" y1="214" x2="130" y2="268" stroke="#94A3B8" stroke-width="2" marker-end="url(#fa)"/>
  <line x1="130" y1="348" x2="130" y2="388" stroke="#94A3B8" stroke-width="2" marker-end="url(#fa)"/>
  <defs>
    <marker id="fa" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94A3B8"/>
    </marker>
  </defs>
  <text x="350" y="470" font-family="Arial, sans-serif" font-size="10" fill="#9CA3AF" text-anchor="middle">OCR J277 2.1 — Standard flowchart symbols for algorithm representation</text>
</svg>
