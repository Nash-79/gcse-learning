<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-labelledby="fde-title fde-desc">
  <title id="fde-title">Fetch-Decode-Execute Cycle with Registers</title>
  <desc id="fde-desc">Diagram showing register interactions during the fetch-decode-execute cycle. RAM on the left connects to CPU registers (PC, MAR, MDR, CIR) on the right, with labelled arrows for each stage.</desc>

  <!-- Background -->
  <rect width="800" height="460" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="400" y="34" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E293B" text-anchor="middle">Fetch-Decode-Execute Cycle</text>

  <!-- ── RAM (left side) ── -->
  <rect x="40" y="70" width="170" height="300" rx="12" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="125" y="100" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6D28D9" text-anchor="middle">Main Memory</text>
  <text x="125" y="118" font-family="Arial, sans-serif" font-size="11" fill="#8B5CF6" text-anchor="middle">(RAM)</text>

  <!-- Memory cells in RAM -->
  <rect x="65" y="136" width="120" height="26" rx="4" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="125" y="154" font-family="Arial, sans-serif" font-size="10" fill="#5B21B6" text-anchor="middle">Address 0: LOAD R1</text>

  <rect x="65" y="168" width="120" height="26" rx="4" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="125" y="186" font-family="Arial, sans-serif" font-size="10" fill="#5B21B6" text-anchor="middle">Address 1: ADD R1,R2</text>

  <rect x="65" y="200" width="120" height="26" rx="4" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="125" y="218" font-family="Arial, sans-serif" font-size="10" fill="#5B21B6" text-anchor="middle">Address 2: STORE R1</text>

  <text x="125" y="252" font-family="Arial, sans-serif" font-size="18" fill="#C4B5FD" text-anchor="middle">⋮</text>

  <text x="125" y="300" font-family="Arial, sans-serif" font-size="9.5" fill="#7C3AED" text-anchor="middle">Stores instructions</text>
  <text x="125" y="315" font-family="Arial, sans-serif" font-size="9.5" fill="#7C3AED" text-anchor="middle">AND data together</text>
  <text x="125" y="332" font-family="Arial, sans-serif" font-size="9" fill="#9CA3AF" text-anchor="middle">(Von Neumann principle)</text>

  <!-- ── CPU (right side) ── -->
  <rect x="430" y="56" width="330" height="350" rx="14" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="470" y="82" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3B82F6">CPU</text>

  <!-- Register: PC -->
  <rect x="460" y="96" width="270" height="60" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.8"/>
  <text x="490" y="123" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1D4ED8">PC</text>
  <text x="490" y="141" font-family="Arial, sans-serif" font-size="9.5" fill="#6B7280">Program Counter</text>
  <text x="660" y="120" font-family="Arial, sans-serif" font-size="9.5" fill="#1D4ED8" text-anchor="middle">Holds address of</text>
  <text x="660" y="134" font-family="Arial, sans-serif" font-size="9.5" fill="#1D4ED8" text-anchor="middle">NEXT instruction</text>

  <!-- Register: MAR -->
  <rect x="460" y="172" width="270" height="60" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.8"/>
  <text x="490" y="199" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400E">MAR</text>
  <text x="490" y="217" font-family="Arial, sans-serif" font-size="9.5" fill="#6B7280">Memory Address Register</text>
  <text x="660" y="196" font-family="Arial, sans-serif" font-size="9.5" fill="#92400E" text-anchor="middle">Holds address to</text>
  <text x="660" y="210" font-family="Arial, sans-serif" font-size="9.5" fill="#92400E" text-anchor="middle">read/write in RAM</text>

  <!-- Register: MDR -->
  <rect x="460" y="248" width="270" height="60" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.8"/>
  <text x="490" y="275" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#065F46">MDR</text>
  <text x="490" y="293" font-family="Arial, sans-serif" font-size="9.5" fill="#6B7280">Memory Data Register</text>
  <text x="660" y="272" font-family="Arial, sans-serif" font-size="9.5" fill="#065F46" text-anchor="middle">Holds data fetched</text>
  <text x="660" y="286" font-family="Arial, sans-serif" font-size="9.5" fill="#065F46" text-anchor="middle">from/written to RAM</text>

  <!-- Register: CIR -->
  <rect x="460" y="324" width="270" height="60" rx="8" fill="#FFE4E6" stroke="#F43F5E" stroke-width="1.8"/>
  <text x="490" y="351" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9F1239">CIR</text>
  <text x="490" y="369" font-family="Arial, sans-serif" font-size="9.5" fill="#6B7280">Current Instruction Register</text>
  <text x="660" y="348" font-family="Arial, sans-serif" font-size="9.5" fill="#9F1239" text-anchor="middle">Holds instruction</text>
  <text x="660" y="362" font-family="Arial, sans-serif" font-size="9.5" fill="#9F1239" text-anchor="middle">being decoded/run</text>

  <!-- ── Stage labels ── -->
  <rect x="220" y="120" width="200" height="28" rx="6" fill="#3B82F6" opacity="0.12"/>
  <text x="320" y="139" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1D4ED8" text-anchor="middle">① FETCH</text>

  <rect x="220" y="248" width="200" height="28" rx="6" fill="#8B5CF6" opacity="0.12"/>
  <text x="320" y="267" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6D28D9" text-anchor="middle">② DECODE (in CU)</text>

  <rect x="220" y="360" width="200" height="28" rx="6" fill="#10B981" opacity="0.12"/>
  <text x="320" y="379" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#065F46" text-anchor="middle">③ EXECUTE (in ALU)</text>

  <!-- ── Arrows ── -->
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3B82F6"/>
    </marker>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10B981"/>
    </marker>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F59E0B"/>
    </marker>
    <marker id="a4" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F59E0B"/>
    </marker>
  </defs>

  <!-- PC → MAR (address copied) -->
  <path d="M 460,115 Q 420,115 420,200 L 460,200" fill="none" stroke="#3B82F6" stroke-width="2" marker-end="url(#a1)"/>
  <text x="408" y="158" font-family="Arial, sans-serif" font-size="9" fill="#3B82F6" text-anchor="middle" transform="rotate(-90,408,158)">copy address</text>

  <!-- MAR → RAM (sends address) -->
  <line x1="460" y1="202" x2="210" y2="202" stroke="#F59E0B" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#a3)"/>
  <text x="336" y="196" font-family="Arial, sans-serif" font-size="9.5" fill="#92400E" text-anchor="middle">address →</text>

  <!-- RAM → MDR (data returned) -->
  <line x1="210" y1="220" x2="460" y2="270" stroke="#10B981" stroke-width="1.8" marker-end="url(#a2)"/>
  <text x="330" y="258" font-family="Arial, sans-serif" font-size="9.5" fill="#065F46" text-anchor="middle">← instruction</text>

  <!-- MDR → CIR -->
  <path d="M 460,278 Q 430,278 430,352 L 460,352" fill="none" stroke="#F43F5E" stroke-width="1.8" marker-end="url(#a4)"/>
  <text x="418" y="316" font-family="Arial, sans-serif" font-size="9" fill="#F43F5E" text-anchor="middle" transform="rotate(-90,418,316)">copy instr.</text>

  <!-- PC increment note -->
  <text x="595" y="418" font-family="Arial, sans-serif" font-size="9.5" fill="#3B82F6" text-anchor="middle">PC incremented after fetch</text>
  <text x="595" y="432" font-family="Arial, sans-serif" font-size="9.5" fill="#3B82F6" text-anchor="middle">to point to next instruction</text>

  <!-- Spec ref -->
  <text x="400" y="452" font-family="Arial, sans-serif" font-size="10" fill="#9CA3AF" text-anchor="middle">OCR J277 1.1b — The fetch-decode-execute cycle and registers</text>
</svg>
