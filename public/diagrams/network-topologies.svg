<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" role="img" aria-labelledby="nt-title nt-desc">
  <title id="nt-title">Network Topologies: Star and Mesh</title>
  <desc id="nt-desc">Side-by-side diagrams comparing star topology (all devices connect to a central switch) and mesh topology (every device connects to every other device).</desc>
  <rect width="760" height="420" fill="#F8FAFC" rx="12"/>
  <text x="380" y="34" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E293B" text-anchor="middle">Network Topologies</text>
  <!-- STAR TOPOLOGY (left) -->
  <text x="190" y="64" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3B82F6" text-anchor="middle">Star Topology</text>
  <!-- Central switch -->
  <rect x="160" y="180" width="60" height="40" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="190" y="205" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1D4ED8" text-anchor="middle">Switch</text>
  <!-- Devices around switch -->
  <circle cx="190" cy="100" r="18" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="190" y="104" font-family="Arial, sans-serif" font-size="9" fill="#1D4ED8" text-anchor="middle">PC</text>
  <circle cx="100" cy="140" r="18" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="100" y="144" font-family="Arial, sans-serif" font-size="9" fill="#1D4ED8" text-anchor="middle">PC</text>
  <circle cx="80" cy="230" r="18" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="80" y="234" font-family="Arial, sans-serif" font-size="9" fill="#1D4ED8" text-anchor="middle">PC</text>
  <circle cx="100" cy="310" r="18" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="100" y="314" font-family="Arial, sans-serif" font-size="9" fill="#1D4ED8" text-anchor="middle">PC</text>
  <circle cx="190" cy="350" r="18" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="190" y="354" font-family="Arial, sans-serif" font-size="9" fill="#1D4ED8" text-anchor="middle">PC</text>
  <circle cx="280" cy="310" r="18" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="280" y="314" font-family="Arial, sans-serif" font-size="9" fill="#1D4ED8" text-anchor="middle">PC</text>
  <circle cx="300" cy="220" r="18" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="300" y="224" font-family="Arial, sans-serif" font-size="9" fill="#1D4ED8" text-anchor="middle">PC</text>
  <circle cx="280" cy="140" r="18" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="280" y="144" font-family="Arial, sans-serif" font-size="9" fill="#1D4ED8" text-anchor="middle">PC</text>
  <!-- Lines from switch to devices -->
  <line x1="190" y1="180" x2="190" y2="118" stroke="#93C5FD" stroke-width="2"/>
  <line x1="162" y1="185" x2="116" y2="155" stroke="#93C5FD" stroke-width="2"/>
  <line x1="160" y1="200" x2="98" y2="228" stroke="#93C5FD" stroke-width="2"/>
  <line x1="162" y1="215" x2="116" y2="295" stroke="#93C5FD" stroke-width="2"/>
  <line x1="190" y1="220" x2="190" y2="332" stroke="#93C5FD" stroke-width="2"/>
  <line x1="218" y1="215" x2="264" y2="295" stroke="#93C5FD" stroke-width="2"/>
  <line x1="220" y1="200" x2="282" y2="222" stroke="#93C5FD" stroke-width="2"/>
  <line x1="218" y1="185" x2="264" y2="153" stroke="#93C5FD" stroke-width="2"/>
  <!-- DIVIDER -->
  <line x1="380" y1="56" x2="380" y2="400" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- MESH TOPOLOGY (right) -->
  <text x="570" y="64" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B5CF6" text-anchor="middle">Mesh Topology</text>
  <!-- 6 mesh nodes -->
  <circle cx="570" cy="110" r="20" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="570" y="114" font-family="Arial, sans-serif" font-size="9" fill="#5B21B6" text-anchor="middle">PC</text>
  <circle cx="680" cy="170" r="20" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="680" y="174" font-family="Arial, sans-serif" font-size="9" fill="#5B21B6" text-anchor="middle">PC</text>
  <circle cx="700" cy="290" r="20" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="700" y="294" font-family="Arial, sans-serif" font-size="9" fill="#5B21B6" text-anchor="middle">PC</text>
  <circle cx="610" cy="370" r="20" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="610" y="374" font-family="Arial, sans-serif" font-size="9" fill="#5B21B6" text-anchor="middle">PC</text>
  <circle cx="460" cy="350" r="20" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="460" y="354" font-family="Arial, sans-serif" font-size="9" fill="#5B21B6" text-anchor="middle">PC</text>
  <circle cx="430" cy="210" r="20" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="430" y="214" font-family="Arial, sans-serif" font-size="9" fill="#5B21B6" text-anchor="middle">PC</text>
  <!-- All mesh connections -->
  <line x1="570" y1="130" x2="680" y2="152" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="570" y1="130" x2="700" y2="272" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="570" y1="130" x2="610" y2="350" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="570" y1="130" x2="460" y2="330" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="570" y1="130" x2="450" y2="210" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="680" y1="190" x2="700" y2="272" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="680" y1="190" x2="610" y2="350" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="680" y1="190" x2="460" y2="330" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="680" y1="190" x2="450" y2="210" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="700" y1="272" x2="610" y2="350" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="700" y1="272" x2="460" y2="330" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="700" y1="272" x2="450" y2="210" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="610" y1="350" x2="460" y2="330" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="610" y1="350" x2="450" y2="210" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="460" y1="330" x2="450" y2="228" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="380" y="410" font-family="Arial, sans-serif" font-size="10" fill="#9CA3AF" text-anchor="middle">OCR J277 1.3 — Star: central switch; Mesh: every device directly connected</text>
</svg>
