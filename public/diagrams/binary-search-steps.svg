<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" role="img" aria-labelledby="bs-title bs-desc">
  <title id="bs-title">Binary Search Step-by-Step</title>
  <desc id="bs-desc">Step-by-step visual of binary search on a sorted list [2, 5, 8, 12, 16, 23, 38, 45, 72, 91], searching for the value 23, showing how the search space halves each step.</desc>
  <rect width="760" height="460" fill="#F8FAFC" rx="12"/>
  <text x="380" y="34" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E293B" text-anchor="middle">Binary Search — Step by Step</text>
  <text x="380" y="54" font-family="Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Sorted list: [ 2, 5, 8, 12, 16, 23, 38, 45, 72, 91 ]   — searching for 23</text>

  <!-- Index labels -->
  <text x="46" y="82" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">idx</text>
  <text x="96"  y="82" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">0</text>
  <text x="136" y="82" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">1</text>
  <text x="176" y="82" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">2</text>
  <text x="216" y="82" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">3</text>
  <text x="256" y="82" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">4</text>
  <text x="296" y="82" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">5</text>
  <text x="336" y="82" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">6</text>
  <text x="376" y="82" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">7</text>
  <text x="416" y="82" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">8</text>
  <text x="456" y="82" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">9</text>

  <!-- Step 1: Full array, mid=4 (value 16), 23>16 so search right half -->
  <text x="46" y="116" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#475569">Step 1:</text>
  <!-- boxes 0-9 -->
  <rect x="76"  y="96" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/><text x="94"  y="116" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">2</text>
  <rect x="116" y="96" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/><text x="134" y="116" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">5</text>
  <rect x="156" y="96" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/><text x="174" y="116" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">8</text>
  <rect x="196" y="96" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/><text x="214" y="116" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">12</text>
  <!-- mid=4 highlighted orange -->
  <rect x="236" y="96" width="36" height="30" rx="4" fill="#FED7AA" stroke="#F97316" stroke-width="2.5"/><text x="254" y="116" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#C2410C" text-anchor="middle">16</text>
  <text x="254" y="94" font-family="Arial, sans-serif" font-size="8" fill="#F97316" text-anchor="middle">mid</text>
  <rect x="276" y="96" width="36" height="30" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="294" y="116" font-family="Arial, sans-serif" font-size="12" fill="#1D4ED8" text-anchor="middle">23</text>
  <rect x="316" y="96" width="36" height="30" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="334" y="116" font-family="Arial, sans-serif" font-size="12" fill="#1D4ED8" text-anchor="middle">38</text>
  <rect x="356" y="96" width="36" height="30" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="374" y="116" font-family="Arial, sans-serif" font-size="12" fill="#1D4ED8" text-anchor="middle">45</text>
  <rect x="396" y="96" width="36" height="30" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="414" y="116" font-family="Arial, sans-serif" font-size="12" fill="#1D4ED8" text-anchor="middle">72</text>
  <rect x="436" y="96" width="36" height="30" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="454" y="116" font-family="Arial, sans-serif" font-size="12" fill="#1D4ED8" text-anchor="middle">91</text>
  <text x="510" y="116" font-family="Arial, sans-serif" font-size="10" fill="#F97316">mid[4]=16, 23&gt;16 → search right</text>

  <!-- Step 2: indices 5-9, mid=7 (value 45), 23<45 search left -->
  <text x="46" y="176" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#475569">Step 2:</text>
  <rect x="76"  y="156" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/><text x="94"  y="176" font-family="Arial, sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">—</text>
  <rect x="116" y="156" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/><text x="134" y="176" font-family="Arial, sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">—</text>
  <rect x="156" y="156" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/><text x="174" y="176" font-family="Arial, sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">—</text>
  <rect x="196" y="156" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/><text x="214" y="176" font-family="Arial, sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">—</text>
  <rect x="236" y="156" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/><text x="254" y="176" font-family="Arial, sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">—</text>
  <rect x="276" y="156" width="36" height="30" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="294" y="176" font-family="Arial, sans-serif" font-size="12" fill="#1D4ED8" text-anchor="middle">23</text>
  <rect x="316" y="156" width="36" height="30" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="334" y="176" font-family="Arial, sans-serif" font-size="12" fill="#1D4ED8" text-anchor="middle">38</text>
  <!-- mid=7 highlighted orange -->
  <rect x="356" y="156" width="36" height="30" rx="4" fill="#FED7AA" stroke="#F97316" stroke-width="2.5"/><text x="374" y="176" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#C2410C" text-anchor="middle">45</text>
  <text x="374" y="154" font-family="Arial, sans-serif" font-size="8" fill="#F97316" text-anchor="middle">mid</text>
  <rect x="396" y="156" width="36" height="30" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="414" y="176" font-family="Arial, sans-serif" font-size="12" fill="#1D4ED8" text-anchor="middle">72</text>
  <rect x="436" y="156" width="36" height="30" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="454" y="176" font-family="Arial, sans-serif" font-size="12" fill="#1D4ED8" text-anchor="middle">91</text>
  <text x="510" y="176" font-family="Arial, sans-serif" font-size="10" fill="#F97316">mid[7]=45, 23&lt;45 → search left</text>

  <!-- Step 3: indices 5-6, mid=5 (value 23) FOUND -->
  <text x="46" y="236" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#475569">Step 3:</text>
  <rect x="76"  y="216" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/><text x="94"  y="236" font-family="Arial, sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">—</text>
  <rect x="116" y="216" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/><text x="134" y="236" font-family="Arial, sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">—</text>
  <rect x="156" y="216" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/><text x="174" y="236" font-family="Arial, sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">—</text>
  <rect x="196" y="216" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/><text x="214" y="236" font-family="Arial, sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">—</text>
  <rect x="236" y="216" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/><text x="254" y="236" font-family="Arial, sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">—</text>
  <!-- FOUND: index 5, value 23 -->
  <rect x="276" y="216" width="36" height="30" rx="4" fill="#ECFDF5" stroke="#10B981" stroke-width="3"/><text x="294" y="236" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#065F46" text-anchor="middle">23</text>
  <text x="294" y="214" font-family="Arial, sans-serif" font-size="8" fill="#10B981" text-anchor="middle">FOUND!</text>
  <rect x="316" y="216" width="36" height="30" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="334" y="236" font-family="Arial, sans-serif" font-size="12" fill="#1D4ED8" text-anchor="middle">38</text>
  <rect x="356" y="216" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/><text x="374" y="236" font-family="Arial, sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">—</text>
  <rect x="396" y="216" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/><text x="414" y="236" font-family="Arial, sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">—</text>
  <rect x="436" y="216" width="36" height="30" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/><text x="454" y="236" font-family="Arial, sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">—</text>
  <text x="510" y="236" font-family="Arial, sans-serif" font-size="10" fill="#10B981" font-weight="bold">mid[5]=23 ✓ Found at index 5!</text>

  <!-- Result banner -->
  <rect x="46" y="264" width="430" height="36" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="261" y="287" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#065F46" text-anchor="middle">Found 23 at index 5  —  only 3 comparisons needed (vs up to 10 for linear search)</text>

  <!-- Key fact box -->
  <rect x="490" y="60" width="250" height="200" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="615" y="82" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">Binary Search Facts</text>
  <text x="500" y="104" font-family="Arial, sans-serif" font-size="10" fill="#64748B">• List MUST be sorted first</text>
  <text x="500" y="122" font-family="Arial, sans-serif" font-size="10" fill="#64748B">• Halves search space each step</text>
  <text x="500" y="140" font-family="Arial, sans-serif" font-size="10" fill="#64748B">• Time: O(log n) — very efficient</text>
  <text x="500" y="158" font-family="Arial, sans-serif" font-size="10" fill="#64748B">• n=1024 → max 10 comparisons</text>
  <text x="500" y="176" font-family="Arial, sans-serif" font-size="10" fill="#64748B">• Linear search: O(n) — checks each</text>
  <text x="500" y="194" font-family="Arial, sans-serif" font-size="10" fill="#64748B">• mid = (low + high) ÷ 2</text>
  <text x="500" y="214" font-family="Arial, sans-serif" font-size="10" fill="#64748B">• If target &lt; mid → search left half</text>
  <text x="500" y="232" font-family="Arial, sans-serif" font-size="10" fill="#64748B">• If target &gt; mid → search right half</text>

  <!-- vs Linear comparison -->
  <rect x="46" y="316" width="430" height="100" rx="10" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <text x="261" y="338" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400E" text-anchor="middle">Binary vs Linear Search</text>
  <text x="120" y="360" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1D4ED8" text-anchor="middle">Binary</text>
  <text x="350" y="360" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6D28D9" text-anchor="middle">Linear</text>
  <text x="120" y="378" font-family="Arial, sans-serif" font-size="10" fill="#374151" text-anchor="middle">Requires sorted list</text>
  <text x="350" y="378" font-family="Arial, sans-serif" font-size="10" fill="#374151" text-anchor="middle">Works on unsorted list</text>
  <text x="120" y="396" font-family="Arial, sans-serif" font-size="10" fill="#374151" text-anchor="middle">O(log n) — fast</text>
  <text x="350" y="396" font-family="Arial, sans-serif" font-size="10" fill="#374151" text-anchor="middle">O(n) — slow for large data</text>

  <text x="380" y="452" font-family="Arial, sans-serif" font-size="10" fill="#9CA3AF" text-anchor="middle">OCR J277 2.1 / AQA 8525 3.1 — Binary search algorithm and trace</text>
</svg>
